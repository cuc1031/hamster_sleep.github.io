<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">🐹 小倉睡覺存錢筒</h1>

<div class="flex justify-between mb-4">
<button onclick="checkIn('sleep')" id="sleepBtn"
class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-xl w-1/2 mr-2">
😴 睡覺打卡
</button>

<button onclick="checkIn('wake')" id="wakeBtn"
class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl w-1/2 ml-2">
🌞 起床打卡
</button>
</div>

<!-- ✅ 新增：取消打卡 -->
<button onclick="resetToday()"
class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl w-full mb-4">
↩️ 取消打卡（重置今天）
</button>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus" class="text-sm"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

</div>

<script>

const START_HOUR = 2;
const END_HOUR = 5;

function getData(){
return JSON.parse(localStorage.getItem('sleepData') || '{}');
}

function saveData(data){
localStorage.setItem('sleepData', JSON.stringify(data));
}

function getTodayKey(){
const d = new Date();
return d.toISOString().split('T')[0];
}

function initWeek(){

const data = getData();
const now = new Date();

if(data.money === undefined) data.money = 0;

const today = getTodayKey();
const day = now.getDay();

if(!data.lastRewardDate) data.lastRewardDate = "";

if(day === 4 && data.lastRewardDate !== today){

data.money += 20;
data.lastRewardDate = today;

}

saveData(data);

}

function checkIn(type){

initWeek();

const data = getData();
const today = getTodayKey();

if(!data.records) data.records = {};
if(!data.records[today]) data.records[today] = {};

const record = data.records[today];

if(record.evaluated){
alert("今天已經完成紀錄，不能再打卡！");
return;
}

if(type === "sleep"){

if(record.sleep){
alert("今天已經打過睡覺卡了！");
return;
}

record.sleep = new Date().toISOString();

}

if(type === "wake"){

if(!record.sleep){
alert("請先打睡覺卡！");
return;
}

if(record.wake){
alert("今天已經打過起床卡了！");
return;
}

record.wake = new Date().toISOString();

}

evaluateDay(today,data);

saveData(data);

render();

}

function evaluateDay(today,data){

const record = data.records[today];

if(record.evaluated) return;

if(record.sleep && record.wake){

const sleepTime = new Date(record.sleep).getHours();
const wakeTime = new Date(record.wake).getHours();

const valid = (sleepTime <= START_HOUR || sleepTime >= 21) && wakeTime >= END_HOUR;

if(!valid){

data.money -= 10;
record.result = "違規 ❌";

}
else{

record.result = "成功 ✅";

}

record.evaluated = true;

}

}

function dailyCheck(){

const data = getData();

for(let day in (data.records || {})){

const record = data.records[day];

if(!record.evaluated){

data.money -= 10;
record.result = "未完成 ❌";
record.evaluated = true;

}

}

saveData(data);

}

// ✅ 新增：重置今天
function resetToday(){

const data = getData();
const today = getTodayKey();
const record = data.records?.[today];

if(!record){
alert("今天沒有紀錄可以重置！");
return;
}

// 還原金額
if(record.evaluated){

if(record.result === "違規 ❌" || record.result === "未完成 ❌"){
data.money += 10;
}

}

// 還原週四獎勵
if(data.lastRewardDate === today){
data.money -= 20;
data.lastRewardDate = "";
}

// 刪除今日紀錄
delete data.records[today];

saveData(data);
render();

alert("今天的打卡已重置！");

}

function render(){

const data = getData();
const today = getTodayKey();

const record = data.records?.[today];

if(!record){

document.getElementById("todayStatus").innerText = "今天尚未打卡";

}
else{

const sleep = record.sleep ? new Date(record.sleep).toLocaleString() : "未打卡";
const wake = record.wake ? new Date(record.wake).toLocaleString() : "未打卡";
const result = record.result || "尚未判定";

document.getElementById("todayStatus").innerText =
`😴 睡覺時間：${sleep}
🌞 起床時間：${wake}
📊 結果：${result}`;

}

document.getElementById("money").innerText =
(data.money ?? 0) + " 元";

updateButtons(record);

}

function updateButtons(record){

const sleepBtn = document.getElementById("sleepBtn");
const wakeBtn = document.getElementById("wakeBtn");

sleepBtn.disabled = record?.sleep;
wakeBtn.disabled = !record?.sleep || record?.wake;

}

initWeek();
dailyCheck();
render();

</script>

</body>
</html>
