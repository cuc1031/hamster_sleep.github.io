<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">小倉睡覺存錢筒</h1>

<div class="flex gap-2 mb-4">
<button onclick="checkIn('sleep')" id="sleepBtn" class="bg-indigo-500 text-white px-4 py-2 rounded-xl w-full">睡覺打卡</button>
<button onclick="checkIn('wake')" id="wakeBtn" class="bg-green-500 text-white px-4 py-2 rounded-xl w-full">起床打卡</button>
</div>

<button onclick="resetToday()" class="bg-red-500 text-white px-4 py-2 rounded-xl w-full mb-3">取消今日打卡</button>
<button onclick="toggleHistory()" class="bg-gray-700 text-white px-4 py-2 rounded-xl w-full mb-3">打卡紀錄</button>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center mb-3">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

<div id="historyBox" class="hidden bg-gray-50 rounded-xl p-3 max-h-60 overflow-y-auto text-xs"></div>

</div>

<script>

function getData(){
let data = JSON.parse(localStorage.getItem('sleepData') || '{}');

if(!data.logs) data.logs = [];
if(!data.checkins) data.checkins = {};
if(!data.lastRewardDate) data.lastRewardDate = "";

return data;
}

function saveData(data){
localStorage.setItem('sleepData', JSON.stringify(data));
}

function getTodayKey(){
return new Date().toISOString().split('T')[0];
}

// 🔥 重新計算 money（最安全）
function recalcMoney(data){
let total = 0;
data.logs.forEach(l => total += l.delta);
return total;
}

// 新增紀錄
function addLog(data, type, delta){

data.logs.push({
dateKey: getTodayKey(),
date: new Date().toLocaleDateString(),
type,
delta
});

// ⭐ 只保留最新10筆
if(data.logs.length > 10){
data.logs = data.logs.slice(-10);
}

}

// 每周獎勵（保證寫入）
function weeklyReward(data){

const today = getTodayKey();
const now = new Date();

if(now.getDay() !== 4) return;

// ⭐ 已經有今天獎勵就不再加
const already = data.logs.some(l => l.dateKey === today && l.type==="每周獎勵");

if(!already){
addLog(data,"每周獎勵",20);
}

}

// 每日檢查
function dailyCheck(data){

const now = new Date();
if(now.getHours() < 6) return;

const today = getTodayKey();

for(let d in data.checkins){

const r = data.checkins[d];

if(d !== today && !r.evaluated){
addLog(data,"未完成",-10);
r.result="未完成";
r.evaluated=true;
}
}

// 今天
const r = data.checkins[today];
if(r && !r.evaluated){
addLog(data,"違規",-10);
r.result="違規";
r.evaluated=true;
}

}

// 打卡
function checkIn(type){

let data = getData();
const today = getTodayKey();

if(!data.checkins[today]) data.checkins[today] = {};
const r = data.checkins[today];

if(r.evaluated){
alert("今天已結算");
return;
}

if(type==="sleep"){
if(r.sleep) return alert("已打過");
r.sleep = new Date().toISOString();
}

if(type==="wake"){
if(!r.sleep) return alert("先睡覺");
if(r.wake) return alert("已打過");
r.wake = new Date().toISOString();
evaluate(today,data);
}

saveData(data);
render();

}

// 判定
function evaluate(today,data){

const r = data.checkins[today];

const sleepH = new Date(r.sleep).getHours();
const wakeH = new Date(r.wake).getHours();

const valid = (sleepH <=2 || sleepH>=21) && wakeH>=5;

if(!valid){
addLog(data,"違規",-10);
r.result="違規";
}else{
addLog(data,"成功",0);
r.result="成功";
}

r.evaluated = true;

}

// ⭐ 取消今日（完整回復）
function resetToday(){

const data = getData();
const today = getTodayKey();

// 刪除今天所有 log
data.logs = data.logs.filter(l => l.dateKey !== today);

// 刪除打卡
delete data.checkins[today];

saveData(data);
render();

}

// UI
function render(){

const data = getData();
const today = getTodayKey();
const r = data.checkins[today];

const money = recalcMoney(data);
document.getElementById("money").innerText = money + " 元";

if(!r){
todayStatus.innerText = "今天尚未打卡";
}else{
todayStatus.innerText =
`睡覺：${r.sleep ? new Date(r.sleep).toLocaleString():"未打卡"}
起床：${r.wake ? new Date(r.wake).toLocaleString():"未打卡"}
結果：${r.result || "未完成"}`;
}

renderHistory();

}

// 歷史紀錄
function renderHistory(){

const data = getData();
const box = document.getElementById("historyBox");

let total = 0;

let html = `
<div class="grid grid-cols-4 font-bold border-b pb-1 mb-1">
<span>日期</span><span>項目</span><span>變動</span><span>總額</span>
</div>
`;

data.logs.forEach(l=>{
total += l.delta;
l.total = total;
});

data.logs.slice().reverse().forEach(l=>{
html += `
<div class="grid grid-cols-4 border-b py-1">
<span>${l.date}</span>
<span>${l.type}</span>
<span>${l.delta}</span>
<span>${l.total}</span>
</div>
`;
});

box.innerHTML = html;

}

function toggleHistory(){
historyBox.classList.toggle("hidden");
}

// 初始化
let data = getData();
weeklyReward(data);
dailyCheck(data);
saveData(data);
render();

</script>

</body>
</html>
