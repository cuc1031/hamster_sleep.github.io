<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">小倉睡覺存錢筒</h1>

<div class="flex gap-2 mb-4">
<button onclick="checkIn('sleep')" id="sleepBtn"
class="bg-indigo-500 text-white px-4 py-2 rounded-xl w-full">
睡覺打卡
</button>

<button onclick="checkIn('wake')" id="wakeBtn"
class="bg-green-500 text-white px-4 py-2 rounded-xl w-full">
起床打卡
</button>
</div>

<button onclick="resetToday()"
class="bg-red-500 text-white px-4 py-2 rounded-xl w-full mb-3">
取消今日打卡
</button>

<button onclick="toggleHistory()"
class="bg-gray-700 text-white px-4 py-2 rounded-xl w-full mb-3">
打卡紀錄
</button>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center mb-3">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

<div id="historyBox" class="hidden bg-gray-50 rounded-xl p-3 max-h-60 overflow-y-auto text-xs"></div>

</div>

<script>

function getData(){
return JSON.parse(localStorage.getItem('sleepData') || '{"money":0,"logs":[],"checkins":{}}');
}

function saveData(data){
localStorage.setItem('sleepData', JSON.stringify(data));
}

function getTodayKey(){
return new Date().toISOString().split('T')[0];
}

// ✅ 新增一筆記錄
function addLog(data, type, delta){

data.money += delta;

data.logs.push({
date: new Date().toLocaleDateString(),
type,
delta,
total: data.money
});

}

// ✅ 每周獎勵
function weeklyReward(data){

const today = getTodayKey();
const now = new Date();

if(!data.lastRewardDate) data.lastRewardDate = "";

if(now.getDay() === 4 && data.lastRewardDate !== today){

addLog(data,"每周獎勵",20);
data.lastRewardDate = today;

}

}

// 打卡
function checkIn(type){

let data = getData();
const today = getTodayKey();

if(!data.checkins[today]) data.checkins[today] = {};

const r = data.checkins[today];

if(type==="sleep"){
if(r.sleep) return alert("已打過");
r.sleep = new Date().toISOString();
}

if(type==="wake"){
if(!r.sleep) return alert("先睡覺");
if(r.wake) return alert("已打過");
r.wake = new Date().toISOString();

evaluate(today,data);
}

saveData(data);
render();

}

// 判定
function evaluate(today,data){

const r = data.checkins[today];

const sleepH = new Date(r.sleep).getHours();
const wakeH = new Date(r.wake).getHours();

const valid = (sleepH <=2 || sleepH>=21) && wakeH>=5;

if(!valid){
addLog(data,"違規",-10);
}else{
addLog(data,"成功",0);
}

}

// 重置（只刪打卡）
function resetToday(){

const data = getData();
const today = getTodayKey();

delete data.checkins[today];

saveData(data);
render();

}

// UI
function render(){

const data = getData();
const today = getTodayKey();
const r = data.checkins[today];

if(!r){
todayStatus.innerText = "今天尚未打卡";
}else{
todayStatus.innerText =
`睡覺：${r.sleep ? new Date(r.sleep).toLocaleString():"未打卡"}
起床：${r.wake ? new Date(r.wake).toLocaleString():"未打卡"}`;
}

money.innerText = data.money + " 元";

renderHistory();

}

// 歷史紀錄（真正逐筆）
function renderHistory(){

const data = getData();
const box = document.getElementById("historyBox");

let html = `
<div class="grid grid-cols-4 font-bold border-b pb-1 mb-1">
<span>日期</span><span>項目</span><span>變動</span><span>總額</span>
</div>
`;

data.logs.slice().reverse().forEach(log=>{
html += `
<div class="grid grid-cols-4 border-b py-1">
<span>${log.date}</span>
<span>${log.type}</span>
<span>${log.delta}</span>
<span>${log.total}</span>
</div>
`;
});

box.innerHTML = html;

}

function toggleHistory(){
historyBox.classList.toggle("hidden");
}

// 初始化
let data = getData();
weeklyReward(data);
saveData(data);
render();

</script>

</body>
</html>
