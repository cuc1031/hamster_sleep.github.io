<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 Firebase 設定（你的） */
const firebaseConfig = {
  apiKey: "AIzaSyA63IPMAscPlLTsoZ3M51ielDRqDNdoYDs",
  authDomain: "hamster-sleep.firebaseapp.com",
  projectId: "hamster-sleep",
  storageBucket: "hamster-sleep.firebasestorage.app",
  messagingSenderId: "108884460648",
  appId: "1:108884460648:web:10d7af9d298e0b3b6aa7dd",
  measurementId: "G-QFX2EEJPHS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DOC_ID = "globalData"
const START_HOUR = 2
const END_HOUR = 5

/* ========= 讀資料 ========= */
async function getData(){
  const ref = doc(db, "sleep", DOC_ID)
  const snap = await getDoc(ref)

  if(snap.exists()){
    return snap.data()
  }else{
    return {money:0,records:{},lastRewardDate:""}
  }
}

/* ========= 存資料 ========= */
async function saveData(data){
  const ref = doc(db, "sleep", DOC_ID)
  await setDoc(ref, data)
}

/* ========= 日期 ========= */
function getTodayKey(){
  return new Date().toISOString().split("T")[0]
}

/* ========= 打卡 ========= */
window.checkIn = async function(type){

  const data = await getData()
  const today = getTodayKey()

  if(!data.records) data.records = {}
  if(!data.records[today]) data.records[today] = {}

  const record = data.records[today]

  if(record.evaluated){
    alert("今天已完成紀錄")
    return
  }

  if(type==="sleep"){
    if(record.sleep){
      alert("今天已打過睡覺卡")
      return
    }
    record.sleep = new Date().toISOString()
  }

  if(type==="wake"){
    if(!record.sleep){
      alert("請先打睡覺卡")
      return
    }
    if(record.wake){
      alert("今天已打過起床卡")
      return
    }
    record.wake = new Date().toISOString()
  }

  evaluateDay(today,data)
  await saveData(data)
  render()
}

/* ========= 判定 ========= */
function evaluateDay(today,data){

  const record = data.records[today]
  if(record.evaluated) return

  if(record.sleep && record.wake){

    const sleepTime = new Date(record.sleep).getHours()
    const wakeTime = new Date(record.wake).getHours()

    const valid =
    (sleepTime <= START_HOUR || sleepTime >= 21) &&
    wakeTime >= END_HOUR

    if(!valid){
      data.money -= 10
      record.result = "違規 ❌"
    }else{
      record.result = "成功 ✅"
    }

    record.evaluated = true
  }
}

/* ========= UI ========= */
window.render = async function(){

  const data = await getData()
  const today = getTodayKey()
  const record = data.records?.[today]

  if(!record){
    document.getElementById("todayStatus").innerText = "今天尚未打卡"
  }else{

    const sleep = record.sleep ?
      new Date(record.sleep).toLocaleString() : "未打卡"

    const wake = record.wake ?
      new Date(record.wake).toLocaleString() : "未打卡"

    const result = record.result || "尚未判定"

    document.getElementById("todayStatus").innerText =
`😴 睡覺時間：${sleep}
🌞 起床時間：${wake}
📊 結果：${result}`
  }

  document.getElementById("money").innerText =
    (data.money ?? 0) + " 元"
}

/* 啟動 */
render()

</script>

</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">🐹 小倉睡覺存錢筒</h1>

<div class="flex justify-between mb-4">

<button onclick="checkIn('sleep')" class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-xl w-1/2 mr-2">
😴 睡覺打卡
</button>

<button onclick="checkIn('wake')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl w-1/2 ml-2">
🌞 起床打卡
</button>

</div>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus" class="text-sm"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

</div>

</body>
</html>
