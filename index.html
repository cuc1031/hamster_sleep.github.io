<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">小倉睡覺存錢筒</h1>

<div class="flex gap-2 mb-4">
<button onclick="checkIn('sleep')" class="bg-indigo-500 text-white px-4 py-2 rounded-xl w-full">睡覺打卡</button>
<button onclick="checkIn('wake')" class="bg-green-500 text-white px-4 py-2 rounded-xl w-full">起床打卡</button>
</div>

<button onclick="resetToday()" class="bg-red-500 text-white px-4 py-2 rounded-xl w-full mb-3">取消今日打卡</button>

<button onclick="toggleHistory()" class="bg-gray-700 text-white px-4 py-2 rounded-xl w-full mb-3">打卡紀錄</button>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center mb-3">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

<div id="historyBox" class="hidden bg-gray-50 rounded-xl p-3 max-h-60 overflow-y-auto text-xs"></div>

</div>

<script>

// 📦 取得資料（含版本檢查）
function getData(){

let data = JSON.parse(localStorage.getItem('sleepData'));

if(!data || data.version !== 2){

data = {
version: 2,
money: 10,
logs: [],
checkins: {},
lastRewardWeek: ""
};

localStorage.setItem("sleepData", JSON.stringify(data));

}

return data;
}

function saveData(data){
localStorage.setItem('sleepData', JSON.stringify(data));
}

// 📅 日期
function getDateKey(d=new Date()){
return d.toISOString().split('T')[0];
}

function formatDate(d){
const date = new Date(d);
return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
}

// ➕ 紀錄
function addLog(data,type,delta){

data.money += delta;

data.logs.push({
date: formatDate(new Date()),
type,
delta,
total: data.money || 0
});

if(data.logs.length>10){
data.logs=data.logs.slice(-10);
}

}

// 🗓 週數
function getWeekNumber(d){
d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
const dayNum = d.getUTCDay() || 7;
d.setUTCDate(d.getUTCDate() + 4 - dayNum);
const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}

// 🎁 每週四 20:00
function weeklyReward(data){

const now = new Date();
const isThursday = now.getDay() === 4;
const isAfter8 = now.getHours() >= 20;

const weekKey = now.getFullYear()+"-"+getWeekNumber(now);

if(isThursday && isAfter8 && data.lastRewardWeek !== weekKey){

addLog(data,"每周獎勵",20);
data.lastRewardWeek = weekKey;

}

}

// ❌ 未完成
function checkMiss(data){

const now = new Date();

const yesterday = new Date();
yesterday.setDate(yesterday.getDate()-1);
const key = getDateKey(yesterday);

if(!data.checkins[key]) data.checkins[key]={};
const r = data.checkins[key];

// 06:00 睡覺
if(now.getHours() >= 6 && !r.sleep && !r.sleepChecked){
addLog(data,"未完成(未睡)",-10);
r.sleepChecked = true;
}

// 12:00 起床
if(now.getHours() >= 12 && !r.wake && !r.wakeChecked){
addLog(data,"未完成(未起床)",-10);
r.wakeChecked = true;
}

}

// 😴 判定
function isValidSleep(sleep,wake){

const s = new Date(sleep);
const w = new Date(wake);

const base = new Date(s);
base.setHours(0,0,0,0);

const start = new Date(base);
start.setHours(2,0,0,0);

const end = new Date(base);
end.setHours(5,0,0,0);

return s<=start && w>=end;
}

// 打卡
function checkIn(type){

let data = getData();
const key = getDateKey();

if(!data.checkins[key]) data.checkins[key]={};
const r = data.checkins[key];

if(type==="sleep"){
if(r.sleep) return alert("已打過");
r.sleep=new Date().toISOString();
}

if(type==="wake"){
if(!r.sleep) return alert("先睡覺");
if(r.wake) return alert("已打過");

r.wake=new Date().toISOString();

if(isValidSleep(r.sleep,r.wake)){
addLog(data,"成功",0);
r.result="成功";
}else{
addLog(data,"違規",-10);
r.result="違規";
}
}

saveData(data);
render();

}

// 取消
function resetToday(){

let data = getData();
const key = getDateKey();

delete data.checkins[key];

saveData(data);
render();

}

// UI
function render(){

let data = getData();
let key = getDateKey();
let r = data.checkins[key];

money.innerText = data.money+" 元";

if(!r){
todayStatus.innerText="今天尚未打卡";
}else{
todayStatus.innerText =
`睡覺：${r.sleep?new Date(r.sleep).toLocaleString():"未打卡"}
起床：${r.wake?new Date(r.wake).toLocaleString():"未打卡"}
結果：${r.result||"未完成"}`;
}

renderHistory();

}

// 歷史
function renderHistory(){

let data = getData();

let html="";

data.logs.slice().reverse().forEach(l=>{
html+=`
<div class="border-b py-1">
${l.date} | ${l.type} | ${l.delta} | ${l.total}
</div>`;
});

historyBox.innerHTML=html;

}

function toggleHistory(){
historyBox.classList.toggle("hidden");
}

// ⏱ 自動執行
setInterval(()=>{
let data = getData();
weeklyReward(data);
checkMiss(data);
saveData(data);
render();
},60000);

// 初始化
render();

</script>

</body>
</html>
