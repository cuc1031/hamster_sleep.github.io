<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">🐹 小倉睡覺存錢筒</h1>

<div class="flex justify-between mb-4">

<button onclick="checkIn('sleep')" 
class="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-xl w-1/2 mr-2">
😴 睡覺打卡
</button>

<button onclick="checkIn('wake')" 
class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl w-1/2 ml-2">
🌞 起床打卡
</button>

</div>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus" class="text-sm"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

</div>

<script>

const BIN_ID = "69cd599aaaba882197b64fcc"
const API_KEY = "$2a$10$1Vh0f1JV5njIk6tmtyJK/.KaRqo2OXvCB5MpTr05vbs6Joba2LClW"

const START_HOUR = 2
const END_HOUR = 5

let cacheData = null

/* ========= 安全 fetch（不會卡死） ========= */
async function safeFetch(url, options = {}, timeout = 3000){
  return Promise.race([
    fetch(url, options),
    new Promise((_, reject)=>
      setTimeout(()=>reject(new Error("timeout")), timeout)
    )
  ])
}

/* ========= 讀資料 ========= */
async function getData(){

  if(cacheData) return cacheData

  try{

    const res = await safeFetch(
      `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,
      {
        headers:{ "X-Master-Key": API_KEY }
      }
    )

    if(!res || !res.ok) throw new Error("fetch fail")

    const json = await res.json()
    cacheData = json.record
    localStorage.setItem("sleepData", JSON.stringify(cacheData))

    return cacheData

  }catch(e){

    console.log("⚠️ API讀取失敗，使用本地", e)

    const local = localStorage.getItem("sleepData")
    if(local){
      cacheData = JSON.parse(local)
      return cacheData
    }

    cacheData = {money:0,records:{},lastRewardDate:""}
    return cacheData
  }
}

/* ========= 存資料 ========= */
async function saveData(data){

  cacheData = data
  localStorage.setItem("sleepData", JSON.stringify(data))

  try{
    await safeFetch(
      `https://api.jsonbin.io/v3/b/${BIN_ID}`,
      {
        method:"PUT",
        headers:{
          "Content-Type":"application/json",
          "X-Master-Key": API_KEY
        },
        body:JSON.stringify(data)
      }
    )
  }catch(e){
    console.log("⚠️ API寫入失敗（已存本地）")
  }
}

/* ========= 日期 ========= */
function getTodayKey(){
  return new Date().toISOString().split("T")[0]
}

/* ========= 每週獎勵 ========= */
async function initWeek(){

  const data = await getData()
  const now = new Date()
  const today = getTodayKey()

  if(data.money === undefined) data.money = 0
  if(!data.records) data.records = {}
  if(!data.lastRewardDate) data.lastRewardDate = ""

  if(now.getDay() === 4 && data.lastRewardDate !== today){
    data.money += 20
    data.lastRewardDate = today
    await saveData(data)
  }
}

/* ========= 打卡 ========= */
async function checkIn(type){

  try{

    const data = await getData()
    const today = getTodayKey()

    if(!data.records[today]) data.records[today] = {}
    const record = data.records[today]

    if(record.evaluated){
      alert("今天已完成紀錄")
      return
    }

    if(type === "sleep"){
      if(record.sleep){
        alert("今天已打過睡覺卡")
        return
      }
      record.sleep = new Date().toISOString()
    }

    if(type === "wake"){
      if(!record.sleep){
        alert("請先打睡覺卡")
        return
      }
      if(record.wake){
        alert("今天已打過起床卡")
        return
      }
      record.wake = new Date().toISOString()
    }

    evaluateDay(today, data)
    await saveData(data)
    render()

  }catch(e){
    console.error("❌ checkIn error", e)
    alert("發生錯誤，但仍可本地使用")
  }
}

/* ========= 判定 ========= */
function evaluateDay(today,data){

  const record = data.records[today]
  if(record.evaluated) return

  if(record.sleep && record.wake){

    const sleepTime = new Date(record.sleep).getHours()
    const wakeTime = new Date(record.wake).getHours()

    const valid =
    (sleepTime <= START_HOUR || sleepTime >= 21) &&
    wakeTime >= END_HOUR

    if(!valid){
      data.money -= 10
      record.result = "違規 ❌"
    }else{
      record.result = "成功 ✅"
    }

    record.evaluated = true
  }
}

/* ========= UI ========= */
async function render(){

  const data = await getData()
  const today = getTodayKey()
  const record = data.records?.[today]

  if(!record){
    document.getElementById("todayStatus").innerText = "今天尚未打卡"
  }else{

    const sleep = record.sleep ?
      new Date(record.sleep).toLocaleString() : "未打卡"

    const wake = record.wake ?
      new Date(record.wake).toLocaleString() : "未打卡"

    const result = record.result || "尚未判定"

    document.getElementById("todayStatus").innerText =
`😴 睡覺時間：${sleep}
🌞 起床時間：${wake}
📊 結果：${result}`
  }

  document.getElementById("money").innerText =
    (data.money ?? 0) + " 元"
}

/* ========= 啟動 ========= */
initWeek()
render()

</script>

</body>
</html>
