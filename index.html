<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小倉睡覺存錢筒</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">

<h1 class="text-2xl font-bold text-center mb-4">小倉睡覺存錢筒</h1>

<div class="flex gap-2 mb-4">
<button onclick="checkIn('sleep')" class="bg-indigo-500 text-white px-4 py-2 rounded-xl w-full">睡覺打卡</button>
<button onclick="checkIn('wake')" class="bg-green-500 text-white px-4 py-2 rounded-xl w-full">起床打卡</button>
</div>

<button onclick="resetToday()" class="bg-red-500 text-white px-4 py-2 rounded-xl w-full mb-3">取消今日打卡</button>

<button onclick="toggleHistory()" class="bg-gray-700 text-white px-4 py-2 rounded-xl w-full mb-3">打卡紀錄</button>

<div class="bg-gray-100 rounded-xl p-3 mb-3">
<p class="text-sm text-gray-600">今日狀態</p>
<pre id="todayStatus"></pre>
</div>

<div class="bg-yellow-100 rounded-xl p-3 text-center mb-3">
<p class="text-sm text-gray-600">累積存款</p>
<p id="money" class="text-2xl font-bold text-yellow-700"></p>
</div>

<div id="historyBox" class="hidden bg-gray-50 rounded-xl p-3 max-h-60 overflow-y-auto text-xs"></div>

</div>

<script>

// 🕕 日界線（06:00）
function getDayKey(date = new Date()){
const d = new Date(date);
if(d.getHours() < 6) d.setDate(d.getDate()-1);
return d.toISOString().split('T')[0];
}

// 📅 固定 yyyy/mm/dd
function formatDate(dateKey){
const d = new Date(dateKey);
const y = d.getFullYear();
const m = String(d.getMonth()+1).padStart(2,'0');
const day = String(d.getDate()).padStart(2,'0');
return `${y}/${m}/${day}`;
}

// 初始化
function getData(){
let data = JSON.parse(localStorage.getItem('sleepData') || '{}');
if(!data.logs) data.logs = [];
if(!data.checkins) data.checkins = {};
if(!data.lastCheckedDate) data.lastCheckedDate = getDayKey();
return data;
}

function saveData(data){
localStorage.setItem('sleepData', JSON.stringify(data));
}

// ➕ 記錄
function addLog(data, type, delta, dateKey){
data.logs.push({
dateKey,
date: formatDate(dateKey),
type,
delta
});
if(data.logs.length > 10){
data.logs = data.logs.slice(-10);
}
}

// ⭐ 補算所有天數（含未登入）
function processDays(data){

let last = new Date(data.lastCheckedDate);
let today = new Date(getDayKey());

while(last < today){

last.setDate(last.getDate()+1);
const key = last.toISOString().split('T')[0];
const weekday = new Date(key).getDay();

// 🎁 每周獎勵（只會一次）
if(weekday === 4){
const exists = data.logs.some(l=>l.dateKey===key && l.type==="每周獎勵");
if(!exists){
addLog(data,"每周獎勵",20,key);
}
}

// ❌ 未完成
const r = data.checkins[key];
if(!r || !r.evaluated){
addLog(data,"未完成",-10,key);

if(!data.checkins[key]) data.checkins[key]={};
data.checkins[key].evaluated=true;
data.checkins[key].result="未完成";
}

}

data.lastCheckedDate = getDayKey();

}

// 😴 判定（完整覆蓋 2~5）
function isValidSleep(sleepTime, wakeTime){

const sleep = new Date(sleepTime);
const wake = new Date(wakeTime);

const base = new Date(sleep);
base.setHours(0,0,0,0);

const start = new Date(base);
start.setHours(2,0,0,0);

const end = new Date(base);
end.setHours(5,0,0,0);

return sleep <= start && wake >= end;

}

// 打卡
function checkIn(type){

let data = getData();
processDays(data);

const key = getDayKey();

if(!data.checkins[key]) data.checkins[key] = {};
const r = data.checkins[key];

if(type==="sleep"){
if(r.sleep) return alert("已打過");
r.sleep = new Date().toISOString();
}

if(type==="wake"){
if(!r.sleep) return alert("先睡覺");
if(r.wake) return alert("已打過");

r.wake = new Date().toISOString();

if(isValidSleep(r.sleep,r.wake)){
addLog(data,"成功",0,key);
r.result="成功";
}else{
addLog(data,"違規",-10,key);
r.result="違規";
}

r.evaluated=true;
}

saveData(data);
render();

}

// ❌ 取消（只刪今天）
function resetToday(){

const data = getData();
const key = getDayKey();

data.logs = data.logs.filter(l =>
!(l.dateKey===key && l.type!=="每周獎勵")
);

delete data.checkins[key];

saveData(data);
render();

}

// UI
function render(){

const data = getData();
processDays(data);
saveData(data);

const key = getDayKey();
const r = data.checkins[key];

// 💰 計算總額
let total = 0;
data.logs.forEach(l=> total+=l.delta);

money.innerText = total+" 元";

if(!r){
todayStatus.innerText="今天尚未打卡";
}else{
todayStatus.innerText =
`睡覺：${r.sleep ? new Date(r.sleep).toLocaleString():"未打卡"}
起床：${r.wake ? new Date(r.wake).toLocaleString():"未打卡"}
結果：${r.result || "未完成"}`;
}

renderHistory();

}

// 📜 歷史紀錄
function renderHistory(){

const data = getData();
let total=0;

let html=`
<div class="grid grid-cols-4 font-bold border-b pb-1 mb-1">
<span>日期</span><span>項目</span><span>變動</span><span>總額</span>
</div>
`;

data.logs.forEach(l=>{
total+=l.delta;
l.total=total;
});

data.logs.slice().reverse().forEach(l=>{
html+=`
<div class="grid grid-cols-4 border-b py-1">
<span>${l.date}</span>
<span>${l.type}</span>
<span>${l.delta}</span>
<span>${l.total}</span>
</div>
`;
});

historyBox.innerHTML=html;

}

function toggleHistory(){
historyBox.classList.toggle("hidden");
}

// 初始化
render();

</script>

</body>
</html>
